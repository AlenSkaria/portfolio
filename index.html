<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skaria Andrews</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.3/gsap.min.js"></script>
</head>
<body>
    <div class="cursor"></div>
    <header class="container">
        <nav>
            <div class="nav-bar">
                <div class="logo">Alen</div>
                <div class="menu-icon"><i class="fa-solid fa-bars-staggered"></i></div>
            </div>
        </nav>
    </header>


    <main class="container">
        <div class="landing-section">
            
                <div class="whoami">
                    <h1 class="overlay abslt">WHO AM I</h1>
                    <h4 class="w-main-text abslt">Hi. I'm <span> Skaria Andrews</span> </h4>
                </div>
                
                <div class="passion">
                    <h1 class="overlay abslt">PASSIONATE</h1>
                    <div class="p-main-text">
                        <h4 class="ux abslt"><span>UX/UI </span>designer </h4>
                        <h4 class="front abslt"><span>Front-end </span>developer </h4>
                    </div>
                    <div class="btn-resume abslt"><a href="#">resume</a></div>

                </div>


                <div class="connect">
                    <h1 class="overlay abslt">LETS CONNECT?</h1>
                    <h4 class="questions abslt"> do you have any <span>questions</span> for me? </h4>
                    <div class="btn-connect abslt"><a href="#">say hello</a></div>
                </div>
        
        </div>
    </main>


    <footer class="container"></footer>

    <script src="main.js"></script>
</body>
</html>
